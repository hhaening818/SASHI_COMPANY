<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>관리자 패널</title>

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Arial;
    background:#f4f6f8;
}

/* 전체 레이아웃 */
.container{
    display:flex;
    height:100vh;
}

/* 사이드바 */
.sidebar{
    width:240px;
    background:#1f2937;
    color:white;
}

.sidebar h2{
    padding:20px;
    margin:0;
    font-size:20px;
    border-bottom:1px solid #374151;
}

.sidebar a{
    display:block;
    padding:12px 20px;
    color:#d1d5db;
    text-decoration:none;
    border-radius:8px;
    margin:4px 10px;
    transition:0.2s;
}

.sidebar a:hover{
    background:#374151;
    color:white;
}

/* ⭐ 현재 페이지 강조 */
.sidebar a.active{
    background:#2563eb;
    color:white;
}

/* 콘텐츠 영역 */
.content{
    flex:1;
    overflow:auto;
}

/* 상단바 */
.topbar{
    background:white;
    padding:15px 30px;
    border-bottom:1px solid #e5e7eb;
    font-weight:bold;
}

/* 카드 */
.card{
    background:white;
    padding:24px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
    margin-bottom:24px;   /* ⭐ 상자 사이 간격 */
}

/* 카드 컨테이너 */
.card-container{
    padding:30px;
}

/* 통계 카드 */
.stat-container{
    display:flex;
    gap:20px;
    margin-bottom:24px;   /* ⭐ 아래 카드와 간격 */
}

.stat-card{
    flex:1;
    background:white;
    padding:24px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.stat-title{
    color:#6b7280;
    font-size:14px;
}

.stat-value{
    font-size:28px;
    font-weight:bold;
    margin-top:5px;
}

.sidebar .home-btn{
    background:#2563eb;
    color:white;
    margin:10px;
    border-radius:8px;
}

.sidebar a:last-child{
    margin-top:20px;
}

</style>

</head>
<body>

<div class="container">

    <!-- 사이드바 -->
    <div class="sidebar">

        <h2>관리자 패널</h2>

        <a href="/admin_panel"
        class="{% if request.path == '/admin_panel' %}active{% endif %}">
        대시보드
        </a>

        <a href="/admin_contacts"
        class="{% if request.path == '/admin_contacts' %}active{% endif %}">
        문의 관리
        </a>

        <a href="/">🏠 홈으로 이동</a>

        <a href="/logout">로그아웃</a>

    </div>

    <!-- 콘텐츠 -->
    <div class="content">

        <div class="topbar">
            관리자 시스템
        </div>

        <div class="card-container">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

</body>
</html>
