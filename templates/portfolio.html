{% extends "base.html" %}

{% block content %}

<section class="portfolio-section">

<div class="portfolio-header">
<h1>시공사례</h1>
<div class="portfolio-line"></div>
<p>건진창호 시공 사례</p>
</div>


<!-- 필터 -->
<div class="portfolio-filter">

<button onclick="filterSelection('all')">전체</button>
<button onclick="filterSelection('apartment')">아파트</button>
<button onclick="filterSelection('house')">주택</button>
<button onclick="filterSelection('store')">상가</button>

</div>

<div id="image-data"
data-images='[
{% for img in images %}
"{{ img[2] }}/{{ img[1] }}"{% if not loop.last %},{% endif %}
{% endfor %}
]'>
</div>

<div class="portfolio-grid">

{% for img in images %}

{% set img_url = url_for('static', filename='uploads/' ~ img[2] ~ '/' ~ img[1]) %}

<div class="portfolio-card {{ img[2] }}"
     data-index="{{ loop.index0 }}"
     onclick="openModal(this.dataset.index)">

<img src="{{ img_url }}">

<div class="portfolio-overlay">
<span>확대보기</span>
</div>

</div>

{% endfor %}

</div>

</section>


<div id="modal" class="modal">

<span class="modal-close" onclick="closeModal()">&times;</span>

<span class="modal-prev" onclick="prevImage()">&#10094;</span>

<img id="modal-img">

<span class="modal-next" onclick="nextImage()">&#10095;</span>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

const imageDataElement = document.getElementById("image-data");

let imageList = JSON.parse(imageDataElement.dataset.images);

imageList = imageList.map(img => "/static/uploads/" + img);

let currentIndex = 0;

window.openModal = function(index){

currentIndex = parseInt(index);

document.getElementById("modal").style.display="flex";

document.getElementById("modal-img").src=imageList[currentIndex];

}

window.closeModal = function(){

document.getElementById("modal").style.display="none";

}

window.nextImage = function(){

currentIndex++;

if(currentIndex>=imageList.length){
currentIndex=0;
}

document.getElementById("modal-img").src=imageList[currentIndex];

}

window.prevImage = function(){

currentIndex--;

if(currentIndex<0){
currentIndex=imageList.length-1;
}

document.getElementById("modal-img").src=imageList[currentIndex];

}

});

function filterSelection(category){

let cards=document.getElementsByClassName("portfolio-card");

for(let i=0;i<cards.length;i++){

if(category=="all"){
cards[i].style.display="block";
}else{
cards[i].style.display=
cards[i].classList.contains(category)?"block":"none";
}

}

}

</script>

{% endblock %}
