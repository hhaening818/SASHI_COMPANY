{% extends "base.html" %}

{% block content %}

<section style="padding:80px 20px; max-width:600px; margin:auto;">

<h1>문의하기</h1>

{% if request.args.get('success') %}
<p style="color:green;">문의가 정상적으로 접수되었습니다.</p>
{% endif %}

<form method="POST">

<input type="text"
name="name"
placeholder="이름"
required
style="width:100%; padding:10px; margin-bottom:10px;">

<input type="text"
name="phone"
placeholder="전화번호"
required
style="width:100%; padding:10px; margin-bottom:10px;">

<textarea
name="message"
placeholder="문의 내용"
required
style="width:100%; padding:10px; height:150px; margin-bottom:10px;"></textarea>

<button type="submit"
style="padding:12px 20px; background:#2f7d32; color:white; border:none;">

문의 보내기

</button>

</form>

</section>

{% endblock %}
