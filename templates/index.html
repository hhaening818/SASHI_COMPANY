{% extends "base.html" %}

{% block content %}

{% if hero %}
<section class="hero"
style="background:url('{{ hero }}') center/cover no-repeat;">
{% else %}
<section class="hero"
style="background:#1c2730;">
{% endif %}

    <div class="hero-overlay">

        <h1>창호 시공 전문 기업</h1>

        <p>정확한 시공, 완벽한 품질</p>

    </div>

</section>

<section class="home-portfolio">

    <div class="home-portfolio-header">
        <h2>시공사례</h2>
        <p>건진창호의 다양한 시공 사례를 확인해보세요</p>
    </div>

    <div class="home-portfolio-grid">

        {% for img in construction_images[:4] %}
        <div class="home-portfolio-card">

            <img src="{{ url_for('static',
                filename='uploads/' ~ img.category ~ '/' ~ img.filename) }}">

        </div>
        {% endfor %}

    </div>

    <div class="home-portfolio-more">
        <a href="/portfolio">시공사례 전체보기 →</a>
    </div>

</section>

<!-- ✅ 시공 사례 슬라이드 추가 -->
<section class="home-slider">

    <h2 style="text-align:center; margin:40px 0;">
        시공 사례
    </h2>

    <div class="slider-wrapper">

        <div class="slider-container">

            {% for img in construction_images %}
            <div class="slide">
                <img src="{{ url_for('static',
                    filename='uploads/' ~ img.category ~ '/' ~ img.filename) }}">
            </div>
            {% endfor %}

        </div>

        <button class="slider-btn prev" onclick="moveSlide(-1)">‹</button>
        <button class="slider-btn next" onclick="moveSlide(1)">›</button>

    </div>

</section>


<!-- 슬라이드 스크립트 -->
<script>

let currentSlide = 0;

function showSlide(index){

    const slides = document.querySelectorAll(".slide");
    const container = document.querySelector(".slider-container");

    if(slides.length === 0) return;

    if(index >= slides.length)
        currentSlide = 0;
    else if(index < 0)
        currentSlide = slides.length - 1;
    else
        currentSlide = index;

    container.style.transform =
        "translateX(-" + currentSlide * 100 + "%)";
}

function moveSlide(direction){
    showSlide(currentSlide + direction);
}

setInterval(()=>{
    moveSlide(1);
}, 3000);

</script>


<!-- 슬라이드 스타일 -->
<style>

.home-slider{
    width:100%;
    max-width:1200px;
    margin:60px auto;
}

.slider-wrapper{
    position:relative;
    overflow:hidden;
}

.slider-container{
    display:flex;
    transition:transform 0.5s ease;
}

.slide{
    min-width:100%;
}

.slide img{
    width:100%;
    height:500px;
    object-fit:cover;
    border-radius:10px;
}

.slider-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.4);
    color:white;
    border:none;
    font-size:30px;
    padding:10px 15px;
    cursor:pointer;
}

.prev{
    left:10px;
}

.next{
    right:10px;
}

</style>

{% endblock %}
