{% extends "base.html" %}

{% block content %}

{% if hero %}
<section class="hero"
style="background:url('{{ hero }}') center/cover no-repeat;">
{% else %}
<section class="hero"
style="background:#1c2730;">
{% endif %}

    <div class="hero-overlay">

        <h1>창호 시공 전문 기업</h1>

        <p>정확한 시공, 완벽한 품질</p>

    </div>

</section>

<section class="box-slide-section">

    <h2 class="slide-title">시공사례</h2>

    <div class="box-slide-wrapper">

        <button class="box-slide-btn left"
        onclick="moveBoxSlide(-1)">‹</button>

        <div class="box-slide-container"
             id="box-slide-container">

            {% for img in construction_images %}
            <div class="box-slide-card">

                <img src="{{ url_for('static',
                    filename='uploads/' ~ img.category ~ '/' ~ img.filename) }}">

            </div>
            {% endfor %}

        </div>

        <button class="box-slide-btn right"
        onclick="moveBoxSlide(1)">›</button>

    </div>

</section>

<!-- 슬라이드 스크립트 -->
<script>

let currentSlide = 0;

function showSlide(index){

    const slides = document.querySelectorAll(".slide");
    const container = document.querySelector(".slider-container");

    if(slides.length === 0) return;

    if(index >= slides.length)
        currentSlide = 0;
    else if(index < 0)
        currentSlide = slides.length - 1;
    else
        currentSlide = index;

    container.style.transform =
        "translateX(-" + currentSlide * 100 + "%)";
}

function moveSlide(direction){
    showSlide(currentSlide + direction);
}

setInterval(()=>{
    moveSlide(1);
}, 3000);

</script>

<script>

let boxIndex = 0;

function moveBoxSlide(direction){

    const container =
        document.getElementById("box-slide-container");

    const total =
        document.querySelectorAll(".box-slide-card").length;

    const visible = 3;

    boxIndex += direction;

    if(boxIndex < 0)
        boxIndex = 0;

    if(boxIndex > total - visible)
        boxIndex = total - visible;

    container.style.transform =
        "translateX(-" + (boxIndex * 33.333) + "%)";
}

</script>

{% endblock %}
