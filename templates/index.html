{% extends "base.html" %}

{% block content %}

<section class="hero"
style="background:url('{{ hero }}') center/cover no-repeat;">

<div class="hero-overlay">

<h1>창호 시공 전문 기업</h1>
<p>정확한 시공, 완벽한 품질</p>

</div>

</section>

<section class="box-slide-section">

    <h2 class="slide-title">시공사례</h2>

    <div class="box-slide-wrapper">

        <button class="box-slide-btn left"
        onclick="moveBoxSlide(-1)">‹</button>

        <div class="box-slide-container"
             id="box-slide-container">

            {% for img in construction_images %}
            <div class="box-slide-card">

                <img src="{{ url_for('static',
                    filename='uploads/' ~ img.category ~ '/' ~ img.filename) }}">

            </div>
            {% endfor %}

        </div>

        <button class="box-slide-btn right"
        onclick="moveBoxSlide(1)">›</button>

    </div>

</section>

<script>

let boxIndex = 0;

function moveBoxSlide(direction){

    const container =
        document.getElementById("box-slide-container");

    const total =
        document.querySelectorAll(".box-slide-card").length;

    const visible = 3;

    boxIndex += direction;

    if(boxIndex < 0)
        boxIndex = 0;

    if(boxIndex > total - visible)
        boxIndex = total - visible;

    container.style.transform =
        "translateX(-" + (boxIndex * 33.333) + "%)";
}

</script>

{% endblock %}
