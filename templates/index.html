{% extends "base.html" %}
{% block content %}

{% set hero_bg = hero if hero else url_for('static', filename='images/default.jpg') %}

<section class="hero"
style="background:url('{{ hero_bg }}') center/cover no-repeat;">
<div class="hero-overlay">

<h1>창호 시공 전문 기업</h1>
<p>정확한 시공, 완벽한 품질</p>

</div>
</section>


<section class="box-slide-section">

<h2 class="slide-title">시공사례</h2>

<div class="box-slide-wrapper">

<button class="box-slide-btn left"
onclick="moveSlide(-1)">‹</button>

<div class="box-slide-container"
id="slide-container">

{% for img in construction_images %}

<div class="box-slide-card">

<img src="{{ url_for('uploaded_file',
category=img.category,
filename=img.filename) }}">

</div>

{% endfor %}

</div>

<button class="box-slide-btn right"
onclick="moveSlide(1)">›</button>

</div>

</section>


<script>

let index = 0;

function moveSlide(dir){

const container =
document.getElementById("slide-container");

const cards =
document.querySelectorAll(".box-slide-card");

const total = cards.length;

let visible = 3;

// 모바일 대응
if(window.innerWidth <= 768){
visible = 1;
}

index += dir;

if(index < 0)
index = 0;

if(index > total - visible)
index = total - visible;

if(index < 0)
index = 0;

const cardWidth =
cards[0].offsetWidth + 20;

container.style.transform =
"translateX(-" + (index * cardWidth) + "px)";

}

</script>

{% endblock %}
