{% extends "base.html" %}

{% block content %}

<h1 style="padding:40px;">관리자 업로드</h1>

<form method="POST" enctype="multipart/form-data" style="padding:40px;">

<input type="file" name="file" required>

<select name="category">

{% for category in categories %}

<option value="{{ category }}">{{ category }}</option>

{% endfor %}

</select>

<br><br>

<input type="text" name="description"
placeholder="설명 (예: 수성구 아파트 KCC 창호 교체)"
style="width:300px; padding:8px;">

<br><br>

<button type="submit">업로드</button>

</form>


<div style="display:flex; flex-wrap:wrap; gap:20px; padding:40px;">

{% for img in images %}

{% set img_url = url_for('static', filename='uploads/' ~ img[2] ~ '/' ~ img[1]) %}

<div style="margin-bottom:30px;">

<img src="{{ img_url }}"
width="250"
style="cursor:pointer"
onclick="openAdminModal('{{ img_url }}')">

<br>

<a href="/set_main/{{ img[0] }}">
<button>대표로 설정</button>
</a>

{% if img[4] == 1 %}
<div style="color:red;">대표 이미지</div>
{% endif %}

카테고리: {{ img[2] }}

<br><br>

<form method="POST" action="/edit_description/{{ img[0] }}">

<input type="text"
name="description"
value="{{ img[3] if img[3] else '' }}"
placeholder="설명 입력"
style="width:250px; padding:5px;">

<button type="submit">설명 저장</button>

</form>

<br>

<a href="/delete/{{ img[0] }}">삭제</a>

</div>

{% endfor %}

</div>

<!-- 관리자 이미지 확대 모달 -->
<div id="admin-modal" class="modal">

<span class="modal-close" onclick="closeAdminModal()">&times;</span>

<img id="admin-modal-img">

</div>


<script>

function openAdminModal(src){

const modal = document.getElementById("admin-modal");

const modalImg = document.getElementById("admin-modal-img");

modal.classList.add("show");

modalImg.src = src;

}

function closeAdminModal(){

document.getElementById("admin-modal").classList.remove("show");

}

</script>

{% endblock %}
