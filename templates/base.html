<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>건진창호</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<header class="header">

<div class="logo">GunJin SASH</div>

<nav>

<a href="/">홈</a>

<a href="/portfolio">시공사례</a>

<a href="/admin">관리자</a>

</nav>

</header>

{% block content %}
{% endblock %}

<!-- 문의 버튼 -->
<div class="contact-buttons">

<a href="#"
   onclick="handlePhoneClick(); return false;"
   class="call-btn">

☎ 전화문의

</a>

<a href="#"
   onclick="openKakaoChat(); return false;"
   class="kakao-btn">

💬 카카오톡 문의

</a>

</div>

<script>

function openKakaoChat(){

    var kakaoUrl = "https://open.kakao.com/o/s4CBOShi";

    var isMobile =
        /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile){

        window.location.href = kakaoUrl;

    }else{

        window.open(kakaoUrl, "_blank");

    }

}

</script>

<script>

function handlePhoneClick(){

    var phoneNumber = "010-7137-2313";

    var isMobile =
        /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile){

        window.location.href = "tel:" + phoneNumber;

    }else{

        alert("전화문의: " + phoneNumber);

    }

}

</script>

<script>

function openModal(src){

const modal=document.getElementById("modal");
const modalImg=document.getElementById("modal-img");

modal.style.display="flex";

setTimeout(()=>{
modal.classList.add("show");
},10);

modalImg.src=src;

}

function closeModal(){

const modal=document.getElementById("modal");

modal.classList.remove("show");

setTimeout(()=>{
modal.style.display="none";
},200);

}

</script>

</body>
</html>
