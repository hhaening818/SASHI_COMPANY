<!DOCTYPE html>
<html lang="ko">
<head>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

content="대구 창호, 샷시 전문 시공 업체 건진창호. 아파트, 주택, 상가 창호 시공. 무료 상담 가능.">

<meta name="keywords"
content="대구 창호, 대구 샷시, 창호 시공, 샷시 시공, 건진창호">

content="여기에코드">

</head>

</head>
<body>

<header class="header">

<div class="logo" onclick="handleLogoClick()">

GunJin SASH

{% if session.get("admin") %}
<span style="
font-size:12px;
color:white;
background:red;
padding:2px 6px;
margin-left:8px;
border-radius:4px;
">
관리자
</span>
{% endif %}

</div>

<nav>

<a href="/">홈</a>

<a href="/portfolio">시공사례</a>

{% if session.get("admin") %}

<a href="/admin_panel">관리자패널</a>

<a href="/admin_contacts">문의관리</a>

<a href="/logout">로그아웃</a>

{% endif %}

</nav>

</header>

{% block content %}
{% endblock %}

<!-- 문의 버튼 -->
<div class="contact-buttons">

<a href="#"
   onclick="handlePhoneClick(); return false;"
   class="call-btn">

☎ 전화문의

</a>

<a href="#"
   onclick="openKakaoChat(); return false;"
   class="kakao-btn">

💬 카카오톡 문의

</a>

</div>

<script>

function openKakaoChat(){

    var kakaoUrl = "https://open.kakao.com/o/s4CBOShi";

    // DB에 기록
    fetch("/kakao_click");

    var isMobile =
        /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile){

        window.location.href = kakaoUrl;

    }else{

        window.open(kakaoUrl, "_blank");

    }

}

</script>

<script>

function handlePhoneClick(){

    var phoneNumber = "010-7137-2313";

    var isMobile =
        /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    if(isMobile){

        window.location.href = "tel:" + phoneNumber;

    }else{

        alert("전화문의: " + phoneNumber);

    }

}

</script>

<script>

let logoClickCount = 0;

function handleLogoClick(){

logoClickCount++;

if(logoClickCount >= 5){

window.location.href = "/gunjin_admin_7137";

logoClickCount = 0;

}

}

</script>

<footer style="
padding:40px;
text-align:center;
background:#1c2730;
color:white;
margin-top:60px;
">

<div style="margin-top:5px; font-size:14px; color:#ccc;">

</div>

<!-- 숨김 관리자 링크 -->
<div style="margin-top:15px; font-size:12px;">

style="color:#888; text-decoration:none;">
관리자
</a>
</div>

</footer>
